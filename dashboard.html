<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파마브로스 공동구매 매출 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #ffffff;
      --bg-secondary:  #f4f4f2;
      --bg-tertiary:   #eeede8;
      --text-primary:  #1a1a18;
      --text-secondary:#5f5e5a;
      --text-tertiary: #888780;
      --border:        rgba(0,0,0,0.10);
      --border-md:     rgba(0,0,0,0.18);
      --radius-md:     8px;
      --radius-lg:     12px;
      --font-sans:     'Inter', 'Helvetica Neue', Arial, sans-serif;
      --font-mono:     'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
      --teal:          #1D9E75;
      --teal-bg:       #E1F5EE;
      --teal-dark:     #0F6E56;
      --amber:         #BA7517;
      --amber-bg:      #FAEEDA;
      --amber-dark:    #854F0B;
      --purple:        #7F77DD;
      --purple-bg:     #EEEDFE;
      --blue:          #378ADD;
      --blue-bg:       #E6F1FB;
      --red:           #C03D2D;
      --red-bg:        #FDECEA;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary:    #1c1c1a;
        --bg-secondary:  #252523;
        --bg-tertiary:   #2c2c2a;
        --text-primary:  #e8e7e2;
        --text-secondary:#a8a7a2;
        --text-tertiary: #6e6d69;
        --border:        rgba(255,255,255,0.08);
        --border-md:     rgba(255,255,255,0.14);
        --teal-bg:       #085041;
        --teal-dark:     #5DCAA5;
        --amber-bg:      #412402;
        --amber-dark:    #EF9F27;
        --purple-bg:     #2A2756;
        --blue-bg:       #162A44;
        --red-bg:        #3D1A15;
      }
    }

    body {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
    }

    #login-view { display: none; }
    #admin-view { display: none; }

    /* ── Login ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .login-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      max-width: 440px;
      width: 100%;
      animation: fadeInUp 0.4s ease;
    }

    .login-card .login-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--teal-bg);
      color: var(--teal-dark);
      margin-bottom: 20px;
    }

    .login-card h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .login-card .sub {
      font-size: 12px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      margin-bottom: 28px;
    }

    .login-card .field {
      margin-bottom: 14px;
    }

    .login-card .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .login-card input, .login-card textarea {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      font-size: 13px;
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: var(--bg-secondary);
      outline: none;
      transition: border-color 0.2s;
    }

    .login-card textarea {
      resize: vertical;
      height: 80px;
      font-size: 12px;
      font-family: var(--font-mono);
    }

    .login-card input:focus, .login-card textarea:focus { border-color: var(--teal); }

    .login-toggle {
      margin-top: 16px;
      text-align: center;
    }

    .login-toggle a {
      font-size: 11px;
      color: var(--text-tertiary);
      cursor: pointer;
      text-decoration: none;
      border-bottom: 1px dashed var(--text-tertiary);
      transition: color 0.15s;
    }

    .login-toggle a:hover { color: var(--teal); border-color: var(--teal); }

    .login-mode { display: none; }
    .login-mode.active { display: block; }

    .btn-connect {
      width: 100%;
      padding: 10px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    .btn-connect:hover { opacity: 0.9; }

    .login-err {
      display: none;
      margin-top: 12px;
      padding: 8px 12px;
      background: var(--red-bg);
      border-radius: var(--radius-md);
      font-size: 12px;
      color: var(--red);
    }

    .login-hint {
      margin-top: 16px;
      font-size: 11px;
      color: var(--text-tertiary);
      line-height: 1.6;
    }

    /* ── Dashboard Layout ── */
    .dash-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-title { font-size: 20px; font-weight: 500; line-height: 1.2; }
    .header-sub   { font-size: 12px; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 3px; }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .badge-teal  { background: var(--teal-bg);  color: var(--teal-dark); }
    .badge-amber { background: var(--amber-bg); color: var(--amber-dark); }

    .pulse {
      width: 6px; height: 6px; border-radius: 50%; background: var(--teal);
      animation: pulse-anim 2.2s ease-in-out infinite;
    }

    .btn-sm {
      padding: 5px 12px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      transition: all 0.15s;
    }

    .btn-sm:hover { border-color: var(--teal); color: var(--teal); }

    .btn-sm.primary {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    .btn-sm.primary:hover { opacity: 0.9; }

    .btn-sm.danger {
      color: var(--red);
      border-color: rgba(192,61,45,0.3);
    }

    .btn-sm.danger:hover { background: var(--red-bg); }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin: 0 0 10px;
    }

    /* ── Metric Cards ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .metric-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }

    .metric-tag {
      font-size: 11px;
      color: var(--text-tertiary);
      margin: 0 0 6px;
      font-weight: 500;
      letter-spacing: .04em;
    }

    .metric-val {
      font-size: 26px;
      font-weight: 500;
      font-family: var(--font-mono);
      line-height: 1;
    }

    .metric-delta {
      font-size: 12px;
      margin-top: 6px;
      font-family: var(--font-mono);
    }

    .delta-up { color: var(--teal-dark); }
    .delta-dn { color: var(--red); }

    .accent-bar {
      height: 2px;
      border-radius: 1px;
      margin-top: 10px;
    }

    .ab-teal   { background: var(--teal); }
    .ab-blue   { background: var(--blue); }
    .ab-purple { background: var(--purple); }
    .ab-amber  { background: var(--amber); }

    /* ── Panel ── */
    .panel {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    /* ── Charts Grid ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    .chart-wrap { position: relative; width: 100%; }

    .chart-empty {
      padding: 40px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 12px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-swatch { width: 9px; height: 9px; border-radius: 2px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 200px;
    }

    .toolbar input {
      flex: 1;
      padding: 8px 12px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      font-size: 12px;
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: var(--bg-primary);
      outline: none;
      min-width: 160px;
    }

    .toolbar input:focus { border-color: var(--teal); }

    .filter-btns { display: flex; gap: 4px; }

    .filter-btn {
      padding: 5px 12px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    .stats-inline {
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
      background: var(--bg-secondary);
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    thead th:hover { color: var(--teal); }

    thead th .sort-icon {
      font-size: 9px;
      margin-left: 3px;
      opacity: 0.3;
    }

    thead th.sorted .sort-icon { opacity: 1; color: var(--teal); }

    tbody td {
      padding: 9px 12px;
      border-bottom: 0.5px solid var(--border);
      vertical-align: middle;
    }

    tbody tr { cursor: pointer; transition: background 0.15s; }
    tbody tr:hover { background: var(--bg-secondary); }

    td.num {
      color: var(--text-tertiary);
      font-size: 11px;
      text-align: center;
      width: 36px;
      font-family: var(--font-mono);
    }

    td.title-cell {
      font-weight: 500;
      max-width: 280px;
      white-space: nowrap;
    }

    td.title-cell span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    td.brand-cell {
      color: var(--teal-dark);
      font-weight: 500;
      font-size: 11px;
    }

    td.date-cell {
      color: var(--text-tertiary);
      font-size: 11px;
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    td.money-cell {
      font-weight: 500;
      text-align: right;
      white-space: nowrap;
      font-family: var(--font-mono);
      font-size: 11px;
    }

    td.pct-cell {
      text-align: right;
      font-weight: 500;
      white-space: nowrap;
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
    }

    .status-badge.active  { background: var(--teal-bg);  color: var(--teal-dark); }
    .status-badge.inactive { background: var(--bg-secondary); color: var(--text-tertiary); }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .status-badge.active .status-dot  { background: var(--teal); }
    .status-badge.inactive .status-dot { background: var(--text-tertiary); }

    /* ── Empty / Loading ── */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
    }

    .empty-state .empty-icon { font-size: 40px; opacity: 0.4; margin-bottom: 12px; }
    .empty-state .empty-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
    .empty-state .empty-desc { font-size: 12px; color: var(--text-tertiary); }

    .loading-wrap {
      padding: 60px 20px;
      text-align: center;
    }

    .loading-spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    .loading-text {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* ── Side Panel ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1000;
    }

    .modal-overlay.show { display: block; }

    .modal-card {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 420px;
      max-width: 90vw;
      background: var(--bg-primary);
      border-left: 0.5px solid var(--border);
      box-shadow: -8px 0 32px rgba(0,0,0,0.12);
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }

    .modal-overlay.show .modal-card {
      transform: translateX(0);
    }

    .modal-header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg-primary);
    }

    .modal-header h2 {
      font-size: 15px;
      font-weight: 500;
    }

    .modal-close {
      width: 28px;
      height: 28px;
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--bg-tertiary); }

    .modal-body { padding: 20px; }

    .modal-section { margin-bottom: 18px; }

    .modal-section h4 {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .modal-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .modal-info-item {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
    }

    .modal-info-item .label {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal-info-item .value {
      font-size: 13px;
      font-weight: 500;
    }

    .modal-product {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: 6px;
    }

    .modal-product img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--bg-tertiary);
    }

    .modal-product .name {
      font-size: 13px;
      font-weight: 500;
    }

    .modal-opts-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .modal-opts-table th {
      background: var(--bg-secondary);
      padding: 8px 10px;
      text-align: left;
      font-weight: 500;
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal-opts-table td {
      padding: 8px 10px;
      border-bottom: 0.5px solid var(--border);
    }

    .modal-opts-table td.right {
      text-align: right;
      font-family: var(--font-mono);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes pulse-anim { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      body { padding: 0; }
      .dash-wrap { padding: 1rem; }
      .header { flex-direction: column; align-items: flex-start; }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar .search-wrap { min-width: 0; }
      .filter-btns { flex-wrap: wrap; }
      .header-actions { width: 100%; }
      .header-actions .btn-sm { flex: 1; text-align: center; }
      .modal-info-grid { grid-template-columns: 1fr; }
      .modal-card { width: 100%; max-width: 100vw; }
    }
  </style>
</head>
<body>

<!-- ── Login View ── -->
<div id="login-view">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-badge"><span class="pulse"></span> LOGIN</div>
      <h1>파마브로스 공동구매 매출 대시보드</h1>
      <p class="sub">admin.store.friendly-pharmacist.com</p>

      <!-- ID/PW Login -->
      <div class="login-mode active" id="login-mode-pw">
        <div class="field">
          <label>아이디 (이메일)</label>
          <input type="email" id="input-id" placeholder="admin@example.com" spellcheck="false" />
        </div>

        <div class="field">
          <label>비밀번호</label>
          <input type="password" id="input-pw" placeholder="비밀번호" />
        </div>

        <button class="btn-connect" onclick="loginWithCredentials()">로그인</button>

        <div class="login-toggle">
          <a onclick="toggleLoginMode('token')">토큰 직접 입력</a>
        </div>
      </div>

      <!-- Token Login -->
      <div class="login-mode" id="login-mode-token">
        <div class="field">
          <label>Bearer Token</label>
          <textarea id="input-token" placeholder="JWT 토큰을 붙여넣기 하세요" spellcheck="false"></textarea>
        </div>

        <button class="btn-connect" onclick="connectWithToken()">연결</button>

        <div class="login-toggle">
          <a onclick="toggleLoginMode('pw')">ID/PW 로그인</a>
        </div>
      </div>

      <div class="login-err" id="login-err"></div>

      <div class="login-hint">
        친한스토어 어드민 계정으로 로그인하세요.

    </div>

</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
    ? 'https://api.store.friendly-pharmacist.com'
    : '';
  const TOKEN_KEY = 'dashboard_bearer_token';

  let bearerToken = '';
  let cachedPlans = [];
  let cachedSellers = [];
  let currentFilter = 'all';
  let sortCol = 'startDate';
  let sortDir = 'desc';
  let planChart = null;
  let commissionChart = null;

  // ── Utilities ──

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatCurrency(n) {
    if (n == null || isNaN(n)) return '-';
    return Number(n).toLocaleString('ko-KR') + '원';
  }

  function formatNumber(n) {
    if (n == null || isNaN(n)) return '0';
    return Number(n).toLocaleString('ko-KR');
  }

  function formatDate(dt) {
    if (!dt) return '-';
    return dt.slice(0, 10);
  }

  function formatPct(n) {
    if (n == null || isNaN(n)) return '-';
    return n + '%';
  }

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  function updateTimestamp() {
    const now = new Date();
    document.getElementById('ts').textContent =
      now.toISOString().slice(0, 10) + ' · ' +
      now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' KST';
  }

  // ── Auth ──

  function checkSavedToken() {
    const saved = localStorage.getItem(TOKEN_KEY);
    if (saved) {
      bearerToken = saved;
      showDashboard();
    } else {
      document.getElementById('login-view').style.display = 'block';
    }
  }

  window.toggleLoginMode = function(mode) {
    document.getElementById('login-mode-pw').classList.toggle('active', mode === 'pw');
    document.getElementById('login-mode-token').classList.toggle('active', mode === 'token');
    document.getElementById('login-err').style.display = 'none';
  };

  window.loginWithCredentials = async function() {
    const idInput = document.getElementById('input-id');
    const pwInput = document.getElementById('input-pw');
    const errEl = document.getElementById('login-err');
    const adminId = idInput.value.trim();
    const password = pwInput.value;

    if (!adminId || !password) {
      errEl.textContent = '아이디와 비밀번호를 입력하세요.';
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';

    try {
      const res = await fetch(API_BASE + '/api/admin/v2/authentications/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ adminId, password })
      });

      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.message || data.title || '로그인 실패';
        errEl.style.display = 'block';
        return;
      }

      const loginData = data.data || data;
      const is2Fa = loginData.is2FaAuth;

      if (is2Fa) {
        errEl.textContent = '2차 인증이 필요한 계정입니다. 토큰 직접 입력을 이용하세요.';
        errEl.style.display = 'block';
        return;
      }

      const tokenObj = loginData.token || {};
      const token = tokenObj.accessToken || tokenObj.access_token || '';

      if (!token) {
        console.log('Login response:', JSON.stringify(data, null, 2));
        errEl.textContent = '토큰을 찾지 못했습니다. 콘솔(F12)에서 응답을 확인하세요.';
        errEl.style.display = 'block';
        return;
      }

      bearerToken = token;
      localStorage.setItem(TOKEN_KEY, token);
      showDashboard();
    } catch (e) {
      errEl.textContent = '연결 실패: ' + e.message;
      errEl.style.display = 'block';
    }
  };

  window.connectWithToken = async function() {
    const input = document.getElementById('input-token');
    const errEl = document.getElementById('login-err');
    const token = input.value.trim();

    if (!token) {
      errEl.textContent = '토큰을 입력하세요.';
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';
    bearerToken = token;

    try {
      await apiCall('/api/admin/v1/group-purchases/plans?limit=1&offset=0');
      localStorage.setItem(TOKEN_KEY, token);
      showDashboard();
    } catch (e) {
      errEl.textContent = 'API 연결 실패: ' + e.message;
      errEl.style.display = 'block';
      bearerToken = '';
    }
  };

  window.disconnectToken = function() {
    localStorage.removeItem(TOKEN_KEY);
    bearerToken = '';
    cachedPlans = [];
    cachedSellers = [];
    location.reload();
  };

  function showDashboard() {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('admin-view').style.display = 'block';
    updateTimestamp();
    setInterval(updateTimestamp, 1000);
    loadAllData();
  }

  // ── API ──

  async function apiCall(endpoint) {
    const res = await fetch(API_BASE + endpoint, {
      headers: { 'Authorization': 'Bearer ' + bearerToken }
    });
    if (!res.ok) {
      if (res.status === 401 || res.status === 403) {
        throw new Error('인증 실패 — 토큰을 확인하세요');
      }
      throw new Error('HTTP ' + res.status);
    }
    return res.json();
  }

  async function fetchSellers() {
    const data = await apiCall('/api/commerce-be/v1/sellers');
    return data.sellers || [];
  }

  // 진행상태 코드 매핑
  const STEP_LABELS = {
    T0: '검토중', T2: '준비중', T4: '확정', T6: '진행중', T8: '진행완료',
    Y0: '정산대기', Y8: '정산완료', C0: '취소', C4: '보류'
  };

  function getStepLabel(code) { return STEP_LABELS[code] || code || '-'; }

  function isActiveStep(code) { return ['T4','T6'].includes(code); }

  async function fetchPlans(limit, offset) {
    const l = limit || 100;
    const o = offset || 0;
    const data = await apiCall('/api/admin/v1/group-purchases/plans?limit=' + l + '&offset=' + o);
    return data;
  }

  async function fetchPlanDetail(planId) {
    const data = await apiCall('/api/admin/v1/group-purchases/plans/' + planId);
    return data.data || data;
  }

  // ── Data Loading ──

  async function loadAllData() {
    showLoading();
    try {
      const plansRes = await fetchPlans(200, 0);

      const planItems = Array.isArray(plansRes.data) ? plansRes.data : [];
      cachedPlans = planItems.map(normalizePlanItem);

      renderAll();
      showToast(cachedPlans.length + '개 공구 데이터를 불러왔습니다.');
    } catch (e) {
      showError('데이터 로드 실패: ' + e.message);
    }
  }

  function normalizePlanItem(raw) {
    const products = raw.group_purchase_products || [];
    const stepCode = raw.group_purchase_plan_step_code || '';
    const totalSales = raw.total_order_amount || 0;

    return {
      id: raw.group_purchase_plan_idx,
      title: raw.group_purchase_title || '',
      brand: raw.brand_name || '',
      startDate: raw.start_date || '',
      endDate: raw.end_date || '',
      stepCode: stepCode,
      stepLabel: getStepLabel(stepCode),
      isActive: isActiveStep(stepCode),
      exposeYn: raw.expose_yn || 'N',
      influencerName: raw.influencer_name || '',
      pharmacyName: raw.pharmacy_name || '',
      sellerName: raw.company_name || '',
      adminName: raw.admin_name || '',
      totalSales: totalSales,
      imageUrl: raw.image_url || '',
      products: products,
      productCount: products.length,
      isReProgressed: raw.is_re_progressed || false,
      memo: raw.memo || '',
      _raw: raw
    };
  }

  // ── Rendering ──

  function renderAll() {
    renderStats();
    renderPlanChartJS();
    renderStatusChartJS();
    renderTable();
  }

  function renderStats() {
    const plans = cachedPlans;
    const active = plans.filter(p => p.isActive).length;
    const totalSales = plans.reduce((s, p) => s + p.totalSales, 0);
    const uniqueInfluencers = new Set(plans.map(p => p.influencerName).filter(Boolean)).size;

    document.getElementById('stat-total').textContent = formatNumber(plans.length);
    document.getElementById('stat-active').textContent = formatNumber(active);
    document.getElementById('stat-sellers').textContent = formatNumber(uniqueInfluencers);
    document.getElementById('stat-products').textContent = totalSales > 0
      ? (totalSales >= 100000000 ? Math.round(totalSales / 100000000 * 10) / 10 + '억' : Math.round(totalSales / 10000).toLocaleString() + '만')
      : '—';
  }

  function getChartColors() {
    const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
    return {
      isDark,
      grid: isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)',
      text: isDark ? '#6e6d69' : '#888780',
      tooltipBg: isDark ? '#2C2C2A' : '#fff',
      tooltipBorder: isDark ? '#444' : '#ddd',
      tooltipTitle: isDark ? '#ccc' : '#333',
      tooltipBody: isDark ? '#aaa' : '#666'
    };
  }

  function renderPlanChartJS() {
    const canvas = document.getElementById('chart-plans');
    const data = cachedPlans.filter(p => p.totalSales > 0)
      .slice().sort((a, b) => b.totalSales - a.totalSales).slice(0, 10);
    const c = getChartColors();

    if (planChart) planChart.destroy();

    if (data.length === 0) {
      canvas.parentElement.innerHTML = '<div class="chart-empty">매출 데이터가 없습니다</div>';
      return;
    }

    planChart = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: data.map(d => d.title || '(제목없음)'),
        datasets: [{
          data: data.map(d => d.totalSales),
          backgroundColor: '#1D9E75',
          borderRadius: 3,
          barThickness: 16
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: c.tooltipBg,
            borderColor: c.tooltipBorder,
            borderWidth: 1,
            titleColor: c.tooltipTitle,
            bodyColor: c.tooltipBody,
            padding: 10,
            callbacks: { label: ctx => formatCurrency(ctx.parsed.x) }
          }
        },
        scales: {
          x: {
            grid: { color: c.grid },
            ticks: {
              color: c.text,
              font: { size: 10, family: 'JetBrains Mono' },
              callback: v => v >= 10000 ? Math.round(v / 10000) + '만' : v
            },
            border: { color: 'transparent' }
          },
          y: {
            grid: { display: false },
            ticks: {
              color: c.text,
              font: { size: 10 },
              callback: function(val) {
                const label = this.getLabelForValue(val);
                return label.length > 12 ? label.slice(0, 12) + '…' : label;
              }
            },
            border: { color: 'transparent' }
          }
        }
      }
    });
  }

  const STEP_COLORS = {
    T0: '#888780', T2: '#BA7517', T4: '#378ADD', T6: '#1D9E75', T8: '#7F77DD',
    Y0: '#E89B3A', Y8: '#5DCAA5', C0: '#C03D2D', C4: '#999'
  };

  function renderStatusChartJS() {
    const canvas = document.getElementById('chart-status');
    const legendEl = document.getElementById('status-legend');
    const c = getChartColors();

    if (commissionChart) commissionChart.destroy();

    const counts = {};
    cachedPlans.forEach(p => {
      const code = p.stepCode || '??';
      counts[code] = (counts[code] || 0) + 1;
    });

    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);

    if (entries.length === 0) {
      canvas.parentElement.innerHTML = '<div class="chart-empty">데이터가 없습니다</div>';
      legendEl.innerHTML = '';
      return;
    }

    commissionChart = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: entries.map(([code]) => getStepLabel(code)),
        datasets: [{
          data: entries.map(([, cnt]) => cnt),
          backgroundColor: entries.map(([code]) => STEP_COLORS[code] || '#888'),
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '68%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: c.tooltipBg,
            borderColor: c.tooltipBorder,
            borderWidth: 1,
            titleColor: c.tooltipTitle,
            bodyColor: c.tooltipBody,
            padding: 10,
            callbacks: { label: ctx => ctx.label + ': ' + ctx.parsed + '건' }
          }
        }
      }
    });

    legendEl.innerHTML = entries.map(([code, cnt]) =>
      '<span class="legend-item"><span class="legend-swatch" style="background:' +
      (STEP_COLORS[code] || '#888') + '"></span>' + getStepLabel(code) + ' ' + cnt + '</span>'
    ).join('');
  }

  function getFiltered() {
    let result = [...cachedPlans];

    if (currentFilter === 'active') {
      result = result.filter(p => ['T4','T6'].includes(p.stepCode));
    } else if (currentFilter === 'completed') {
      result = result.filter(p => ['T8','Y0','Y8'].includes(p.stepCode));
    } else if (currentFilter === 'preparing') {
      result = result.filter(p => ['T0','T2'].includes(p.stepCode));
    }

    const q = document.getElementById('search-input').value.trim().toLowerCase();
    if (q) {
      result = result.filter(p => {
        const hay = [p.title, p.brand, p.sellerName, p.influencerName]
          .concat(p.products.map(pr => pr.product_name))
          .filter(Boolean).join(' ').toLowerCase();
        return hay.includes(q);
      });
    }

    if (sortCol) {
      result.sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });
    }

    return result;
  }

  function renderTable() {
    const filtered = getFiltered();
    const area = document.getElementById('table-area');

    document.getElementById('stats-inline').innerHTML =
      '조회 <strong>' + filtered.length + '</strong>건';

    if (filtered.length === 0) {
      area.innerHTML = '<div class="empty-state">' +
        '<div class="empty-icon">📭</div>' +
        '<div class="empty-title">데이터가 없어요</div>' +
        '<div class="empty-desc">검색 조건을 변경해 보세요.</div></div>';
      return;
    }

    const cols = [
      { key: '', label: '#' },
      { key: 'title', label: '공구명' },
      { key: 'brand', label: '브랜드' },
      { key: 'influencerName', label: '약사' },
      { key: 'startDate', label: '시작일' },
      { key: 'endDate', label: '종료일' },
      { key: 'stepCode', label: '상태' },
      { key: 'totalSales', label: '매출' },
      { key: 'sellerName', label: '파트너' }
    ];

    let thead = '<tr>';
    cols.forEach(c => {
      const sorted = sortCol === c.key;
      const icon = sorted ? (sortDir === 'asc' ? '▲' : '▼') : '⇅';
      const cls = sorted ? ' class="sorted"' : '';
      if (c.key) {
        thead += '<th' + cls + ' onclick="handleSort(\'' + c.key + '\')">' +
          esc(c.label) + '<span class="sort-icon">' + icon + '</span></th>';
      } else {
        thead += '<th>#</th>';
      }
    });
    thead += '</tr>';

    let tbody = '';
    filtered.forEach((p, i) => {
      const statusCls = p.isActive ? 'active' : 'inactive';

      const thumb = p.imageUrl
        ? '<img src="' + esc(p.imageUrl) + '" style="width:28px;height:28px;border-radius:4px;object-fit:cover;vertical-align:middle;margin-right:8px;background:var(--bg-tertiary)" onerror="this.style.display=\'none\'">'
        : '<span style="display:inline-block;width:28px;height:28px;border-radius:4px;background:var(--bg-tertiary);vertical-align:middle;margin-right:8px"></span>';

      tbody += '<tr onclick="openDetail(' + p.id + ')">' +
        '<td class="num">' + (i + 1) + '</td>' +
        '<td class="title-cell" style="display:flex;align-items:center">' + thumb + '<span>' + esc(p.title) + '</span></td>' +
        '<td class="brand-cell">' + esc(p.brand) + '</td>' +
        '<td style="font-size:11px">' + esc(p.influencerName) + '</td>' +
        '<td class="date-cell">' + formatDate(p.startDate) + '</td>' +
        '<td class="date-cell">' + formatDate(p.endDate) + '</td>' +
        '<td><span class="status-badge ' + statusCls + '"><span class="status-dot"></span>' + esc(p.stepLabel) + '</span></td>' +
        '<td class="money-cell">' + (p.totalSales ? formatCurrency(p.totalSales) : '-') + '</td>' +
        '<td style="font-size:11px">' + esc(p.sellerName) + '</td>' +
        '</tr>';
    });

    area.innerHTML = '<div class="table-wrap"><table>' +
      '<thead>' + thead + '</thead>' +
      '<tbody>' + tbody + '</tbody>' +
      '</table></div>';
  }

  // ── Interactions ──

  window.handleSearch = function() { renderTable(); };

  window.handleFilter = function(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === filter);
    });
    renderTable();
  };

  window.handleSort = function(col) {
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = 'asc';
    }
    renderTable();
  };

  window.refreshData = function() { loadAllData(); };

  // ── Detail Modal ──

  window.openDetail = async function(planId) {
    const plan = cachedPlans.find(p => p.id === planId);
    if (!plan) return;

    document.getElementById('modal-title').textContent = plan.title || '공구 상세';

    let html = '';

    html += '<div class="modal-section">' +
      '<h4>기본 정보</h4>' +
      '<div class="modal-info-grid">' +
      infoItem('공구명', plan.title) +
      infoItem('브랜드', plan.brand) +
      infoItem('시작일', formatDate(plan.startDate)) +
      infoItem('종료일', formatDate(plan.endDate)) +
      infoItem('진행상태', plan.stepLabel) +
      infoItem('약사', plan.influencerName) +
      infoItem('약국', plan.pharmacyName) +
      infoItem('파트너', plan.sellerName) +
      infoItem('담당자', plan.adminName) +
      infoItem('총 매출', plan.totalSales ? formatCurrency(plan.totalSales) : '-') +
      '</div></div>';

    if (plan.imageUrl) {
      html += '<div class="modal-section"><h4>대표 이미지</h4>' +
        '<img src="' + esc(plan.imageUrl) + '" style="max-width:100%;border-radius:8px" onerror="this.style.display=\'none\'" />' +
        '</div>';
    }

    if (plan.products.length > 0) {
      html += '<div class="modal-section"><h4>공구 제품</h4>';
      plan.products.forEach(p => {
        const imgSrc = p.image_url || '';
        html += '<div class="modal-product">' +
          (imgSrc ? '<img src="' + esc(imgSrc) + '" alt="" onerror="this.style.display=\'none\'">' : '') +
          '<span class="name">' + esc(p.product_name || p.group_purchase_product_name || '') + '</span>' +
          '</div>';
      });
      html += '</div>';
    }

    if (plan.memo) {
      html += '<div class="modal-section"><h4>메모</h4>' +
        '<div style="padding:10px 12px;background:var(--bg-secondary);border-radius:8px;font-size:13px;white-space:pre-wrap">' +
        esc(plan.memo) + '</div></div>';
    }

    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('detail-modal').classList.add('show');
  };

  function infoItem(label, value) {
    return '<div class="modal-info-item">' +
      '<div class="label">' + esc(label) + '</div>' +
      '<div class="value">' + esc(value || '-') + '</div>' +
      '</div>';
  }

  window.closeModal = function() {
    document.getElementById('detail-modal').classList.remove('show');
  };

  document.getElementById('detail-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Export ──

  function getExportHeaders() {
    return ['공구ID','공구명','브랜드','약사','약국','시작일','종료일','상태','매출','파트너','담당자'];
  }

  function getExportRows() {
    return getFiltered().map(p => [
      p.id || '',
      p.title || '',
      p.brand || '',
      p.influencerName || '',
      p.pharmacyName || '',
      formatDate(p.startDate),
      formatDate(p.endDate),
      p.stepLabel,
      p.totalSales || 0,
      p.sellerName || '',
      p.adminName || ''
    ]);
  }

  function getDateStamp() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  window.exportExcel = function() {
    const headers = getExportHeaders();
    const rows = getExportRows();
    const aoa = [headers, ...rows];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '공구 매출');
    XLSX.writeFile(wb, '친한스토어_공구대시보드_' + getDateStamp() + '.xlsx');
    showToast('엑셀 파일을 다운로드합니다.');
  };

  window.exportCSV = function() {
    const headers = getExportHeaders();
    const rows = getExportRows();
    const lines = [headers, ...rows].map(r =>
      r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')
    );
    const bom = '﻿';
    const blob = new Blob([bom + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '친한스토어_공구대시보드_' + getDateStamp() + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('CSV 파일을 다운로드합니다.');
  };

  // ── UI Helpers ──

  function showLoading() {
    document.getElementById('table-area').innerHTML =
      '<div class="loading-wrap"><div class="loading-spinner"></div>' +
      '<div class="loading-text">데이터를 불러오는 중...</div></div>';
  }

  function showError(msg) {
    document.getElementById('table-area').innerHTML =
      '<div class="empty-state">' +
      '<div class="empty-icon">⚠️</div>' +
      '<div class="empty-title">오류 발생</div>' +
      '<div class="empty-desc">' + esc(msg) + '</div></div>';
  }

  // ── Enter key support ──
  document.getElementById('input-pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loginWithCredentials();
  });
  document.getElementById('input-id').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('input-pw').focus();
  });

  // ── Init ──
  checkSavedToken();

})();
</script>
</body>
</html>
